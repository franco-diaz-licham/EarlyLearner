name: API

on:
  workflow_dispatch:

env:
  BACKEND_DIR: backend
  SOLUTION_FILE: backend/EarlyLearner.slnx
  BUILD_CONFIGURATION: Release
  DOTNET_VERSION: 10.0.x
  API_IMAGE: early-learner-api
  IMAGE_TAG: ${{ github.sha }}
  ACR_NAME: ${{ secrets.ACR_NAME }}
  RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
  API_CONTAINER_APP: ${{ vars.API_CONTAINER_APP_NAME }}

jobs:
  build:
    name: Build and Test API
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: pwsh

    steps:
      # Pull the repository content into the GitHub-hosted runner.
      - name: Checkout repository
        uses: actions/checkout@v4

      # Install the .NET SDK used by the solution.
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # Restore all backend projects and test projects in the solution.
      - name: Restore solution
        run: dotnet restore $env:SOLUTION_FILE

      # Compile the full solution so shared project changes are validated.
      - name: Build solution
        run: dotnet build $env:SOLUTION_FILE --configuration $env:BUILD_CONFIGURATION --no-restore

      # Run the backend test suite before allowing image publication.
      - name: Run backend tests
        run: dotnet test $env:SOLUTION_FILE --configuration $env:BUILD_CONFIGURATION --no-build --logger "trx;LogFileName=test-results.trx"

  publish:
    name: Build and Push API Image
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        shell: pwsh

    steps:
      # Checkout is repeated because each GitHub Actions job runs on a fresh runner.
      - name: Checkout repository
        uses: actions/checkout@v4

      # Authenticate with Azure so the workflow can log in to ACR.
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # Docker push uses the ACR login session created here.
      - name: Login to Azure Container Registry
        run: |
          if ([string]::IsNullOrWhiteSpace($env:ACR_NAME)) {
            throw "Missing ACR_NAME secret."
          }

          az acr login --name $env:ACR_NAME

      # Build from the repository root because the Dockerfile copies backend/ into the image build context.
      - name: Build API Docker image
        run: |
          $image = "$($env:ACR_NAME).azurecr.io/$($env:API_IMAGE):$($env:IMAGE_TAG)"

          docker build `
            -t $image `
            -f "$env:GITHUB_WORKSPACE/docker/api.dockerfile" `
            $env:GITHUB_WORKSPACE

      # Publish the commit-tagged image to ACR.
      - name: Push API Docker image
        run: |
          $image = "$($env:ACR_NAME).azurecr.io/$($env:API_IMAGE):$($env:IMAGE_TAG)"
          docker push $image

  deploy:
    name: Deploy API to Azure Container Apps
    runs-on: ubuntu-latest
    needs: publish
    defaults:
      run:
        shell: pwsh

    steps:
      # Authenticate again because deployment runs in a separate job and runner.
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # Point the existing Container App at the newly pushed image.
      - name: Update API Container App
        run: |
          if ([string]::IsNullOrWhiteSpace($env:RESOURCE_GROUP)) {
            throw "Missing AZURE_RESOURCE_GROUP repository variable."
          }

          if ([string]::IsNullOrWhiteSpace($env:API_CONTAINER_APP)) {
            throw "Missing API_CONTAINER_APP_NAME repository variable."
          }

          $image = "$($env:ACR_NAME).azurecr.io/$($env:API_IMAGE):$($env:IMAGE_TAG)"

          az containerapp update `
            --name $env:API_CONTAINER_APP `
            --resource-group $env:RESOURCE_GROUP `
            --image $image
