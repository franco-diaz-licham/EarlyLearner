name: earlylearner

services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.127.0
    container_name: otel-collector
    command: ["--config=/etc/otelcol-contrib/config.yml"]
    ports:
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./otel-collector-config.yml:/etc/otelcol-contrib/config.yml:ro

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    container_name: blob-mock
    command: ["azurite", "--skipApiVersionCheck", "--blobHost", "0.0.0.0"]
    ports:
      - 10000:10000
      - 10001:10001
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:10000/devstoreaccount1?comp=list"]
      interval: 5s
      retries: 5

  cosmos-db:
    image: mcr.microsoft.com/cosmosdb/linux/azure-cosmos-emulator:latest
    container_name: cosmos-db
    hostname: cosmos-db
    environment:
      AZURE_COSMOS_EMULATOR_PARTITION_COUNT: "3"
      AZURE_COSMOS_EMULATOR_ENABLE_DATA_PERSISTENCE: "true"
      AZURE_COSMOS_EMULATOR_KEY: "local-dev"
    ports:
      - "8081:8081"
      - "10250-10255:10250-10255"
    volumes:
      - cosmos-data:/data/db

  servicebus-mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: servicebus-mssql
    hostname: servicebus-mssql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "ServiceBus_dev_password_123"

  servicebus-emulator:
    image: mcr.microsoft.com/azure-messaging/servicebus-emulator:latest
    container_name: servicebus-emulator
    hostname: servicebus-emulator
    ports:
      - "5672:5672"
      - "5300:5300"
    volumes:
      - ./servicebus/config.json:/ServiceBus_Emulator/ConfigFiles/Config.json:ro
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "ServiceBus_dev_password_123"
      SQL_SERVER: "servicebus-mssql"
      EMULATOR_HTTP_PORT: "5300"
      SQL_WAIT_INTERVAL: "15"
    depends_on:
      - servicebus-mssql
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:5300/health"]
      interval: 10s
      timeout: 5s
      retries: 12

  db:
    image: postgres:17-alpine
    container_name: db
    hostname: db
    environment:
      POSTGRES_DB: "early_learner_main"
      POSTGRES_USER: "local-dev"
      POSTGRES_PASSWORD: "local-dev"
    ports:
      - "55432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U local-dev -d early_learner_main"]
      interval: 10s
      timeout: 5s
      retries: 5

  audit-db:
    image: postgres:17-alpine
    container_name: audit-db
    hostname: audit-db
    environment:
      POSTGRES_DB: "early_learner_audit"
      POSTGRES_USER: "local-dev"
      POSTGRES_PASSWORD: "local-dev"
    ports:
      - "55433:5432"
    volumes:
      - audit-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U local-dev -d early_learner_audit"]
      interval: 10s
      timeout: 5s
      retries: 5

  db-seeder:
    image: db-seeder-early-learner
    container_name: db-seeder-early-learner
    build:
      context: ..
      dockerfile: docker/db-seeder.dockerfile
    depends_on:
      - db
      - early-learner-api
    environment:
      POSTGRES_HOST: "db"
      POSTGRES_PORT: "5432"
      POSTGRES_DB: "early_learner_main"
      POSTGRES_USER: "local-dev"
      POSTGRES_PASSWORD: "local-dev"
      SEED_FILE: "/scripts/seed.sql"

  early-learner-api:
    build:
      context: ..
      dockerfile: docker/api.dockerfile
    image: early-learner-api:local
    container_name: early-learner-api
    ports:
      - "5136:80"
    depends_on:
      - azurite
      - cosmos-db
      - db
      - otel-collector
      - servicebus-emulator
    environment:
      ConnectionStrings__Db: "Host=db;Port=5432;Database=early_learner_main;Username=local-dev;Password=local-dev;Maximum Pool Size=200;Timeout=60"
      AzureBlob__ConnectionString: "DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://host.docker.internal:10000/devstoreaccount1;QueueEndpoint=http://host.docker.internal:10001/devstoreaccount1;"
      AzureBlob__ContainerName: "earlylearner-files"
      CosmosDb__ConnectionString: "AccountEndpoint=https://cosmos-db:8081/;AccountKey=local-dev;"
      CosmosDb__DatabaseName: "earlylearner"
      CosmosDb__DefaultTimeToLiveSeconds: "86400"
      CosmosDb__AllowInsecureEmulatorCertificate: "true"
      AzureServiceBus__ConnectionString: "Endpoint=sb://servicebus-emulator;SharedAccessKeyName=RootManageSharedAccessKey;SharedAccessKey=SAS_KEY_VALUE;UseDevelopmentEmulator=true;"
      AzureServiceBus__AdministrationConnectionString: "Endpoint=sb://servicebus-emulator:5300;SharedAccessKeyName=RootManageSharedAccessKey;SharedAccessKey=SAS_KEY_VALUE;UseDevelopmentEmulator=true;"
      Observability__OtlpEndpoint: "http://otel-collector:4317"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost/health/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "blobmock.localhost.me:host-gateway"

  early-learner-worker:
    build:
      context: ..
      dockerfile: docker/worker.dockerfile
    image: early-learner-worker:local
    container_name: early-learner-worker
    depends_on:
      - audit-db
      - cosmos-db
      - otel-collector
      - servicebus-emulator
    environment:
      ConnectionStrings__AuditDb: "Host=audit-db;Port=5432;Database=early_learner_audit;Username=local-dev;Password=local-dev;Maximum Pool Size=50;Timeout=60"
      AzureServiceBus__ConnectionString: "Endpoint=sb://servicebus-emulator;SharedAccessKeyName=RootManageSharedAccessKey;SharedAccessKey=SAS_KEY_VALUE;UseDevelopmentEmulator=true;"
      AzureServiceBus__AdministrationConnectionString: "Endpoint=sb://servicebus-emulator:5300;SharedAccessKeyName=RootManageSharedAccessKey;SharedAccessKey=SAS_KEY_VALUE;UseDevelopmentEmulator=true;"
      CosmosDb__ConnectionString: "AccountEndpoint=https://cosmos-db:8081/;AccountKey=local-dev;"
      CosmosDb__DatabaseName: "earlylearner"
      CosmosDb__DefaultTimeToLiveSeconds: "86400"
      CosmosDb__AllowInsecureEmulatorCertificate: "true"
      EarlyLearner__Url: "http://localhost:5173"
      DOTNET_ENVIRONMENT: "Development"
      Observability__OtlpEndpoint: "http://otel-collector:4317"

volumes:
  azurite-data:
    driver: local
  cosmos-data:
    name: early_learner_cosmos-data
    driver: local
  audit-postgres-data:
    name: early_learner_audit-postgres-data
    driver: local
  postgres-data:
    name: early_learner_main-postgres-data
    driver: local
