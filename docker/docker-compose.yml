name: earlylearner

services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.127.0
    container_name: otel-collector
    command: ["--config=/etc/otelcol-contrib/config.yml"]
    ports:
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./otel-collector-config.yml:/etc/otelcol-contrib/config.yml:ro

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    container_name: blob-mock
    command: ["azurite", "--skipApiVersionCheck", "--blobHost", "0.0.0.0", "--queueHost", "0.0.0.0"]
    ports:
      - 10000:10000
      - 10001:10001
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "require(''http'').get(''http://127.0.0.1:10000/devstoreaccount1?comp=list'', res => process.exit(0)).on(''error'', () => process.exit(1))"',
        ]
      interval: 5s
      timeout: 5s
      retries: 5

  cosmos-db:
    image: mcr.microsoft.com/cosmosdb/linux/azure-cosmos-emulator:latest
    container_name: cosmos-db
    hostname: cosmos-db
    environment:
      AZURE_COSMOS_EMULATOR_PARTITION_COUNT: "3"
      AZURE_COSMOS_EMULATOR_ENABLE_DATA_PERSISTENCE: "true"
    ports:
      - "8081:8081"
      - "10250-10255:10250-10255"
    volumes:
      - cosmos-data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "curl -k -sS https://localhost:8081/ >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  servicebus-mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: servicebus-mssql
    hostname: servicebus-mssql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "ServiceBus_dev_password_123"

  servicebus-emulator:
    image: mcr.microsoft.com/azure-messaging/servicebus-emulator:latest
    container_name: servicebus-emulator
    hostname: servicebus-emulator
    ports:
      - "5672:5672"
      - "5300:5300"
    volumes:
      - ./servicebus/config.json:/ServiceBus_Emulator/ConfigFiles/Config.json:ro
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "ServiceBus_dev_password_123"
      SQL_SERVER: "servicebus-mssql"
      EMULATOR_HTTP_PORT: "5300"
      SQL_WAIT_INTERVAL: "15"
    depends_on:
      - servicebus-mssql

  early_learner_local_db:
    image: postgres:17-alpine
    container_name: early_learner_local_db
    hostname: early_learner_local_db
    environment:
      POSTGRES_DB: "main"
      POSTGRES_USER: "local-dev"
      POSTGRES_PASSWORD: "local-dev"
    ports:
      - "55432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U local-dev -d main"]
      interval: 10s
      timeout: 5s
      retries: 5

  db-seeder:
    image: db-seeder-early-learner
    container_name: db-seeder-early-learner
    build:
      context: ..
      dockerfile: docker/db-seeder.dockerfile
    depends_on:
      - early_learner_local_db
      - api
    environment:
      POSTGRES_HOST: "early_learner_local_db"
      POSTGRES_PORT: "5432"
      POSTGRES_DB: "main"
      POSTGRES_USER: "local-dev"
      POSTGRES_PASSWORD: "local-dev"
      SEED_FILE: "/scripts/seed.sql"

  api:
    build:
      context: ..
      dockerfile: docker/api.dockerfile
    image: api:local
    container_name: api
    ports:
      - "5136:80"
    depends_on:
      azurite:
        condition: service_healthy
      cosmos-db:
        condition: service_healthy
      early_learner_local_db:
        condition: service_healthy
      servicebus-emulator:
        condition: service_started
      otel-collector:
        condition: service_started
    environment:
      ConnectionStrings__Db: "Host=early_learner_local_db;Port=5432;Database=main;Username=local-dev;Password=local-dev;Maximum Pool Size=200;Timeout=60"
      AzureBlob__ConnectionString: "DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1;QueueEndpoint=http://azurite:10001/devstoreaccount1;"
      CosmosDb__ConnectionString: "AccountEndpoint=https://cosmos-db:8081/;AccountKey=C2y6yDjf5/R+ob0N8A7Cgv30VRDJIWEHLM+4QDU5DE2nQ9nDuVTqobD4b8mGGyPMbIZnqyMsEcaGQy67XIw/Jw==;"
      AzureServiceBus__ConnectionString: "Endpoint=sb://servicebus-emulator;SharedAccessKeyName=RootManageSharedAccessKey;SharedAccessKey=SAS_KEY_VALUE;UseDevelopmentEmulator=true;"
      AzureServiceBus__AdministrationConnectionString: "Endpoint=sb://servicebus-emulator:5300;SharedAccessKeyName=RootManageSharedAccessKey;SharedAccessKey=SAS_KEY_VALUE;UseDevelopmentEmulator=true;"
      Observability__OtlpEndpoint: "http://otel-collector:4317"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost/health/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  frontend:
    build:
      context: ..
      dockerfile: docker/frontend.dockerfile
    image: frontend:local
    container_name: frontend
    ports:
      - "5173:5173"
    depends_on:
      api:
        condition: service_healthy
    environment:
      VITE_API_BASE_URL: "http://localhost:5136"
      VITE_API_VERSION: "v1"
      VITE_APP_NAME: "EarlyLearner"
      VITE_ENTRA_CLIENT_ID: "a08163b9-bc2e-4783-bda2-a04287d216ec"
      VITE_ENTRA_AUTHORITY: "https://earlylearnerapp.ciamlogin.com/3a8a1443-0b3e-4de5-9e59-03bf8c3bd514"
      VITE_ENTRA_API_SCOPE: "api://1953e0fa-dafc-480c-b2bf-faa4fb5aa694/access_as_user"

  worker:
    build:
      context: ..
      dockerfile: docker/worker.dockerfile
    image: worker:local
    container_name: worker
    depends_on:
      azurite:
        condition: service_healthy
      cosmos-db:
        condition: service_healthy
      early_learner_local_db:
        condition: service_healthy
      servicebus-emulator:
        condition: service_started
      otel-collector:
        condition: service_started
    environment:
      ConnectionStrings__AuditDb: "Host=early_learner_local_db;Port=5432;Database=audit;Username=local-dev;Password=local-dev;Maximum Pool Size=50;Timeout=60"
      AzureServiceBus__ConnectionString: "Endpoint=sb://servicebus-emulator;SharedAccessKeyName=RootManageSharedAccessKey;SharedAccessKey=SAS_KEY_VALUE;UseDevelopmentEmulator=true;"
      AzureServiceBus__AdministrationConnectionString: "Endpoint=sb://servicebus-emulator:5300;SharedAccessKeyName=RootManageSharedAccessKey;SharedAccessKey=SAS_KEY_VALUE;UseDevelopmentEmulator=true;"
      CosmosDb__ConnectionString: "AccountEndpoint=https://cosmos-db:8081/;AccountKey=C2y6yDjf5/R+ob0N8A7Cgv30VRDJIWEHLM+4QDU5DE2nQ9nDuVTqobD4b8mGGyPMbIZnqyMsEcaGQy67XIw/Jw==;"
      DOTNET_ENVIRONMENT: "Development"
      Observability__OtlpEndpoint: "http://otel-collector:4317"

volumes:
  azurite-data:
    driver: local
  cosmos-data:
    name: early_learner_cosmos-data
    driver: local
  postgres-data:
    name: early_learner_postgres-data
    driver: local
